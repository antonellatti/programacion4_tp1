<div class="chat-page">
  <div class="chat-container">
    <div class="chat-card">
      <div class="chat-header">
        <button class="chat-volver" routerLink="/home">← Volver</button>
        <h2 class="chat-titulo">Chat <i class="ti ti-messages"></i></h2>
      </div>

      <div class="chat-mensajes" #mensajesContainer>
        @for (msg of mensajes; track msg.id) {
          <div class="chat-mensaje" [class.mio]="esMio(msg)" [class.otro]="!esMio(msg)">
            <span class="chat-nombre">{{ msg.usuario_nombre }}</span>
            <div class="chat-burbuja">{{ msg.mensaje }}</div>
            <span class="chat-hora">{{ formatearHora(msg.created_at) }}</span>
          </div>
        }
      </div>

      <div class="chat-input-container">
        <input 
          class="chat-input"
          type="text"
          placeholder="Escribí un mensaje..."
          [(ngModel)]="nuevoMensaje"
          (keyup.enter)="enviarMensaje()"
          [disabled]="cargando">
        <button 
          class="chat-btn-enviar"
          (click)="enviarMensaje()"
          [disabled]="cargando || !nuevoMensaje.trim()">
          ➤
        </button>
      </div>
    </div>
  </div>
</div>
