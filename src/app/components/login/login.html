<div class="page-bg login-page">
  <div class="login-card">
    <h2 class="login-titulo">{{ 'LOGIN.TITULO' | translate }}</h2>

    <form [formGroup]="form" (ngSubmit)="iniciarSesion()">
      <div class="login-field">
        <label>{{ 'LOGIN.EMAIL' | translate }}</label>
        <input formControlName="email" type="email" placeholder="tu@email.com">
        <span class="login-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          {{ 'LOGIN.EMAIL_INVALIDO' | translate }}
        </span>
      </div>

      <div class="login-field">
        <label>{{ 'LOGIN.PASSWORD' | translate }}</label>
        <input formControlName="password" type="password" placeholder="••••••">
        <span class="login-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          {{ 'LOGIN.PASSWORD_CORTA' | translate }}
        </span>
      </div>

      <span class="login-error" *ngIf="error">{{ 'LOGIN.ERROR' | translate }}</span>

      <button class="login-btn-primary" type="submit" [disabled]="cargando">
        {{ cargando ? ('LOGIN.CARGANDO' | translate) : ('LOGIN.ENTRAR' | translate) }}
      </button>
    </form>

    <div class="login-divider">{{ 'LOGIN.ACCESO_RAPIDO' | translate }}</div>

    <div class="login-rapido">
      <button *ngFor="let u of usuariosRapidos"
              class="login-btn-rapido"
              (click)="loginRapido(u)"
              [disabled]="cargando">
        {{ u.nombre }}
      </button>
    </div>

    <p class="login-registro">
      {{ 'LOGIN.NO_CUENTA' | translate }}
      <a routerLink="/registro">{{ 'LOGIN.REGISTRATE' | translate }}</a>
    </p>
  </div>
</div>
